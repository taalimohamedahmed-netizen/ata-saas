<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATA SaaS | Secure Login</title>
  
  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- Tailwind CSS compiled -->
  <link rel="stylesheet" href="/css/tailwind.css">
</head>
<body class="login-page">

  <!-- Minimal Shadcn-style Auth Card -->
  <div class="w-full max-w-[400px] bg-card rounded-xl border border-border shadow-sm p-8">
    
    <!-- Header -->
    <div class="flex flex-col space-y-2 text-center mb-8">
      <div class="flex items-center justify-center gap-2 mb-2">
        <div class="w-10 h-10 rounded-lg bg-primary text-primary-foreground flex items-center justify-center text-xl">
          <i class="ph ph-robot"></i>
        </div>
        <div class="text-2xl font-bold tracking-tight">ATA <span class="text-primary">SaaS</span></div>
      </div>
      <p class="text-sm text-muted-foreground">Enter your credentials to access the gateway</p>
    </div>

    <!-- Tabs -->
    <div class="grid grid-cols-2 w-full p-1 bg-muted rounded-lg mb-6">
      <button id="tab-login-btn" class="inline-flex items-center justify-center whitespace-nowrap rounded-md px-3 py-1.5 text-sm font-medium transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 shadow-sm bg-background text-foreground">Sign In</button>
      <button id="tab-signup-btn" class="inline-flex items-center justify-center whitespace-nowrap rounded-md px-3 py-1.5 text-sm font-medium transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 text-muted-foreground hover:bg-muted/50">Sign Up</button>
    </div>

    <!-- Alerts -->
    <div id="auth-error" class="hidden mb-6 rounded-md bg-destructive/10 p-4 text-sm font-medium text-destructive border border-destructive/20"></div>
    <div id="auth-success" class="hidden mb-6 rounded-md bg-green-50 p-4 text-sm font-medium text-green-800 border border-green-200"></div>

    <!-- Form -->
    <form id="auth-form" class="space-y-4">
      <div class="space-y-2">
        <label for="auth-email" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">Email</label>
        <input type="email" id="auth-email" class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 transition-colors" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="space-y-2">
        <label for="auth-password" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">Password</label>
        <input type="password" id="auth-password" class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 transition-colors" placeholder="••••••••" required autocomplete="current-password" minlength="6">
      </div>
      
      <button type="submit" id="auth-submit-btn" class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2 w-full mt-6 shadow hover:shadow-md">
        <span class="btn-text" id="auth-btn-text">Sign In</span>
        <div class="spinner"></div>
      </button>
    </form>
    
  </div>

  <div class="mt-8 text-center text-xs text-muted-foreground">
    Secured by ATA Automation Gateway &copy; 2026
  </div>

  <script>
    let mode = 'login';
    const tabLogin = document.getElementById('tab-login-btn');
    const tabSignup = document.getElementById('tab-signup-btn');

    tabLogin.addEventListener('click', () => setMode('login'));
    tabSignup.addEventListener('click', () => setMode('signup'));

    function setMode(m) {
      mode = m;
      
      // Update Tab Styles (Shadcn style tabs)
      if (m === 'login') {
        tabLogin.className = "inline-flex items-center justify-center whitespace-nowrap rounded-md px-3 py-1.5 text-sm font-medium transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 shadow-sm bg-background text-foreground";
        tabSignup.className = "inline-flex items-center justify-center whitespace-nowrap rounded-md px-3 py-1.5 text-sm font-medium transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 text-muted-foreground hover:bg-muted/50";
      } else {
        tabSignup.className = "inline-flex items-center justify-center whitespace-nowrap rounded-md px-3 py-1.5 text-sm font-medium transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 shadow-sm bg-background text-foreground";
        tabLogin.className = "inline-flex items-center justify-center whitespace-nowrap rounded-md px-3 py-1.5 text-sm font-medium transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 text-muted-foreground hover:bg-muted/50";
      }

      document.getElementById('auth-btn-text').textContent = m === 'login' ? 'Sign In' : 'Create Account';
      document.getElementById('auth-error').style.display = 'none';
      document.getElementById('auth-success').style.display = 'none';
    }

    function showError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('auth-success').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('auth-success');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('auth-error').style.display = 'none';
    }

    async function initAuth() {
      const res = await fetch('/api/config');
      const { supabaseUrl, supabaseAnonKey } = await res.json();
      const client = supabase.createClient(supabaseUrl, supabaseAnonKey);

      // Already logged in? go to dashboard
      const { data: { session } } = await client.auth.getSession();
      if (session) { window.location.href = '/dashboard.html'; return; }

      document.getElementById('auth-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('auth-submit-btn');
        btn.classList.add('btn-loading');
        btn.disabled = true;

        const email = document.getElementById('auth-email').value.trim();
        const password = document.getElementById('auth-password').value;

        try {
          if (mode === 'login') {
            const { error } = await client.auth.signInWithPassword({ email, password });
            if (error) {
              if (error.code === 'email_not_confirmed') {
                showError('Email not confirmed. Please check your inbox and click the confirmation link, then try again.');
              } else if (error.code === 'invalid_credentials') {
                showError('Incorrect email or password.');
              } else {
                showError(error.message);
              }
              return;
            }
            window.location.href = '/dashboard.html';
          } else {
            const { data, error } = await client.auth.signUp({ email, password });
            if (error) throw error;
            if (data?.user && !data?.session) {
              showSuccess('Account created! Check your email inbox for a confirmation link, then sign in.');
            } else if (data?.session) {
              window.location.href = '/dashboard.html';
            } else {
              showSuccess('Account created! Check your email to confirm, then sign in.');
            }
            setMode('login');
          }
        } catch (err) {
          showError(err.message);
        } finally {
          btn.classList.remove('btn-loading');
          btn.disabled = false;
        }
      });
    }

    initAuth().catch(console.error);
  </script>
</body>
</html>
