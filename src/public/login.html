<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATA SaaS | Login</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    .auth-container { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; position:relative; z-index:1; }
    .auth-card { background:var(--bg-secondary); border:1px solid var(--border-glass); border-radius:var(--radius-lg); padding:40px; width:100%; max-width:420px; box-shadow:0 8px 40px rgba(0,0,0,0.5); }
    .auth-logo { display:flex; align-items:center; gap:12px; margin-bottom:32px; }
    .auth-logo-icon { width:44px; height:44px; background:var(--accent-grad); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; color:white; }
    .auth-logo-title { font-size:22px; font-weight:800; } .auth-logo-title span { color:var(--accent-light); }
    .auth-tabs { display:flex; gap:0; border-bottom:1px solid var(--border-glass); margin-bottom:28px; }
    .auth-tab { flex:1; background:none; border:none; color:var(--text-secondary); font-size:14px; font-weight:500; padding:10px; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all 0.2s; }
    .auth-tab.active { color:var(--accent-light); border-bottom-color:var(--accent-light); }
    .auth-error { background:var(--red-bg); color:var(--red); border:1px solid rgba(248,113,113,0.2); border-radius:var(--radius-sm); padding:12px 16px; font-size:13px; margin-bottom:16px; display:none; }
    .auth-success { background:var(--green-bg); color:var(--green); border:1px solid rgba(52,211,153,0.2); border-radius:var(--radius-sm); padding:12px 16px; font-size:13px; margin-bottom:16px; display:none; }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon"><i class="ph-bold ph-robot"></i></div>
        <div class="auth-logo-title">ATA <span>SaaS</span></div>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login-btn">Sign In</button>
        <button class="auth-tab" id="tab-signup-btn">Sign Up</button>
      </div>

      <div id="auth-error" class="auth-error"></div>
      <div id="auth-success" class="auth-success"></div>

      <form id="auth-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="auth-email" class="form-input" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group" style="margin-top:16px;">
          <label class="form-label">Password</label>
          <input type="password" id="auth-password" class="form-input" placeholder="••••••••" required autocomplete="current-password" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" id="auth-submit-btn" style="width:100%;margin-top:24px;justify-content:center;">
          <span class="btn-text" id="auth-btn-text">Sign In</span>
          <div class="spinner"></div>
        </button>
      </form>
    </div>
  </div>

  <script>
    let mode = 'login';

    document.getElementById('tab-login-btn').addEventListener('click', () => setMode('login'));
    document.getElementById('tab-signup-btn').addEventListener('click', () => setMode('signup'));

    function setMode(m) {
      mode = m;
      document.getElementById('tab-login-btn').classList.toggle('active', m === 'login');
      document.getElementById('tab-signup-btn').classList.toggle('active', m === 'signup');
      document.getElementById('auth-btn-text').textContent = m === 'login' ? 'Sign In' : 'Create Account';
      document.getElementById('auth-error').style.display = 'none';
      document.getElementById('auth-success').style.display = 'none';
    }

    function showError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('auth-success').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('auth-success');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('auth-error').style.display = 'none';
    }

    async function initAuth() {
      const res = await fetch('/api/config');
      const { supabaseUrl, supabaseAnonKey } = await res.json();
      const client = supabase.createClient(supabaseUrl, supabaseAnonKey);

      // Already logged in? go to dashboard
      const { data: { session } } = await client.auth.getSession();
      if (session) { window.location.href = '/dashboard.html'; return; }

      document.getElementById('auth-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('auth-submit-btn');
        btn.classList.add('btn-loading');
        btn.disabled = true;

        const email = document.getElementById('auth-email').value.trim();
        const password = document.getElementById('auth-password').value;

        try {
          if (mode === 'login') {
            const { error } = await client.auth.signInWithPassword({ email, password });
            if (error) {
              if (error.code === 'email_not_confirmed') {
                showError('Email not confirmed. Please check your inbox and click the confirmation link, then try again.');
              } else if (error.code === 'invalid_credentials') {
                showError('Incorrect email or password.');
              } else {
                showError(error.message);
              }
              return;
            }
            window.location.href = '/dashboard.html';
          } else {
            const { data, error } = await client.auth.signUp({ email, password });
            if (error) throw error;
            if (data?.user && !data?.session) {
              showSuccess('Account created! Check your email inbox for a confirmation link, then sign in.');
            } else if (data?.session) {
              window.location.href = '/dashboard.html';
            } else {
              showSuccess('Account created! Check your email to confirm, then sign in.');
            }
            setMode('login');
          }
        } catch (err) {
          showError(err.message);
        } finally {
          btn.classList.remove('btn-loading');
          btn.disabled = false;
        }
      });
    }

    initAuth().catch(console.error);
  </script>
</body>
</html>
