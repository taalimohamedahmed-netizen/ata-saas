services:
  - type: postgres
    data:
      serviceName: db
      image: postgres:16
      password: change-me-strong-password

  - type: app
    data:
      serviceName: ata-saas
      source:
        type: github
        owner: taalimohamedahmed-netizen
        repo: ata-saas
        ref: master
        path: /backend
        autoDeploy: true
      build:
        type: dockerfile
      env: |
        APP_ENV=production
        APP_HOST=0.0.0.0
        APP_PORT=8000
        APP_BASE_URL=https://api.saas.ataproject.cloud
        LOG_LEVEL=INFO
        DATABASE_URL=postgresql+asyncpg://postgres:change-me-strong-password@$(PROJECT_NAME)_db:5432/postgres
        REDIS_URL=
        JWT_SECRET=change-me-to-a-long-random-string
        JWT_ALGORITHM=HS256
        JWT_EXPIRE_MINUTES=1440
        ANTHROPIC_API_KEY=sk-ant-your-real-key-here
        ANTHROPIC_MODEL=claude-sonnet-4-6
        CORS_ORIGINS=https://saas.ataproject.cloud
      domains:
        - host: api.saas.ataproject.cloud
          port: 8000
          https: true

  - type: app
    data:
      serviceName: frontend
      source:
        type: github
        owner: taalimohamedahmed-netizen
        repo: ata-saas
        ref: master
        path: /frontend
        autoDeploy: true
      build:
        type: dockerfile
      env: |
        NEXT_PUBLIC_API_URL=https://api.saas.ataproject.cloud
      domains:
        - host: saas.ataproject.cloud
          port: 3000
          https: true

  - type: app
    data:
      serviceName: shopify-app
      source:
        type: github
        owner: taalimohamedahmed-netizen
        repo: ata-saas
        ref: master
        path: /shopify-app
        autoDeploy: true
      build:
        type: dockerfile
      env: |
        NODE_ENV=production
        PORT=3000
        SHOPIFY_API_KEY=24e1b82bb78aa043611ab6343f1ba96c
        SHOPIFY_API_SECRET=SET_IN_EASYPANEL_DASHBOARD
        SCOPES=read_orders,write_orders,read_products,write_products,read_customers,write_customers
        SHOPIFY_APP_URL=https://shopify-app.ataproject.cloud
        DATABASE_URL=postgresql+asyncpg://postgres:change-me-strong-password@$(PROJECT_NAME)_db:5432/ata_shopify
        ATA_BACKEND_URL=https://api.ataproject.cloud
        INTERNAL_SECRET=CHANGE_ME_SAME_AS_BACKEND
      domains:
        - host: shopify-app.ataproject.cloud
          port: 3000
          https: true
